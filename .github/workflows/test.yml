name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: gym-tracker-app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: gym-tracker-app/frontend

      - name: Run frontend tests
        run: npm test -- --watchAll=false
        working-directory: gym-tracker-app/frontend
        env:
          CI: true

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: gym-tracker-app/backend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: gym-tracker-app/backend

      - name: Run backend tests
        run: npm test
        working-directory: gym-tracker-app/backend
        env:
          CI: true
